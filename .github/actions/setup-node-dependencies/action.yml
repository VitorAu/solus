name: Setup node dependencies

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Enable Corepack
      shell: bash
      run: |
        corepack enable
        corepack prepare yarn@4.12.0 --activate

    - name: Install dependencies
      shell: bash
      run: yarn install --immutable
